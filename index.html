<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presidential Fight Night</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="arena-wrap" aria-label="Celebrity Clash Arcade game">
        <canvas id="game" width="1280" height="720"></canvas>

        <div id="selectScreen" class="select-screen">
          <div class="title-stack">
            <span class="kicker">Cinematic celebrity combat prototype</span>
            <h1>Presidential Fight Night</h1>
          </div>
          <div class="roster" id="roster"></div>
          <button id="startButton" class="start-button" type="button">Start Match</button>
        </div>

        <div id="roundBanner" class="round-banner">Round 1</div>

        <div id="battleUI" class="battle-ui hidden">
          <div class="action-menu">
            <button type="button" class="move-btn" data-move="light">Jab</button>
            <button type="button" class="move-btn" data-move="heavy">Heavy Strike</button>
            <button type="button" class="move-btn special" data-move="special">Special</button>
            <button type="button" class="move-btn block" data-move="block">Guard</button>
          </div>
        </div>

        <div id="matchEndScreen" class="match-end-screen hidden">
          <div class="match-end-panel">
            <span id="matchResultKicker" class="kicker">Best of 3 complete</span>
            <h2 id="matchResultTitle">Match Over</h2>
            <p id="matchResultText"></p>
            <div class="match-end-actions">
              <button id="rematchButton" class="start-button compact" type="button">Rematch</button>
              <button id="selectButton" class="start-button compact secondary" type="button">Select Fighter</button>
            </div>
          </div>
        </div>
      </section>

      <section class="controls">
        <div>
          <strong>Jab</strong>
          <span>J</span>
        </div>
        <div>
          <strong>Heavy</strong>
          <span>K</span>
        </div>
        <div>
          <strong>Special</strong>
          <span>L</span>
        </div>
        <div>
          <strong>Guard</strong>
          <span>Space</span>
        </div>
      </section>
    </main>

    <script src="game.js?v=2"></script>
  </body>
</html>
